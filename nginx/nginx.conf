events {
    worker_connections 256;
}

http {
    upstream ticketing {
        server ticketing-service:8000;
    }
    upstream venue {
        server venue-service:8000;
    }
    upstream artist {
        server artist-service:8000;
    }
    upstream payment {
        server payment-service:8000;
    }
    upstream notification {
        server notification-service:8000;
    }

    server {
        listen 8080;
        server_name localhost;

        # --- Ticketing Service ---
        location /api/orders {
            proxy_pass http://ticketing/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Venue Service ---
        location /api/capacity/ {
            rewrite ^/api/capacity/(.*)$ /capacity/$1 break;
            proxy_pass http://venue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/reservations {
            proxy_pass http://venue/reservations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Artist / Lineup Service ---
        location /api/lineup/ {
            rewrite ^/api/lineup/(.*)$ /lineup/$1 break;
            proxy_pass http://artist;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Payment Service ---
        location /api/payments {
            proxy_pass http://payment/payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Notification Service ---
        location /api/notifications {
            proxy_pass http://notification/notifications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Health checks ---
        location /health/ticketing  { proxy_pass http://ticketing/health;  }
        location /health/venue       { proxy_pass http://venue/health;      }
        location /health/artist      { proxy_pass http://artist/health;     }
        location /health/payment     { proxy_pass http://payment/health;    }
        location /health/notification { proxy_pass http://notification/health; }
    }
}
